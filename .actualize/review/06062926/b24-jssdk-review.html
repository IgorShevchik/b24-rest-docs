<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0e0f13; --panel:#16181d; --panel2:#1c1f26; --line:#2a2e37;
    --txt:#e7e9ee; --muted:#8a909c; --dim:#5b616e;
    --ok:#6ee7a8; --rem:#fb923c; --warn:#fbbf24; --info:#60a5fa; --skip:#6b7280;
    --warnbg:rgba(251,191,36,.12); --infobg:rgba(96,165,250,.12); --rembg:rgba(251,146,60,.10);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.45}
  .mono{font-family:'IBM Plex Mono',monospace}
  .wrap{max-width:1060px;margin:0 auto;padding:22px 18px 96px}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg),var(--bg) 78%,transparent);
    padding:6px 0 14px;margin:-6px 0 4px}
  h1{font-size:17px;font-weight:700;margin:0 0 2px;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:12px;margin-bottom:14px}
  .sub b{color:var(--txt);font-weight:600}

  .bar{height:8px;border-radius:6px;background:var(--panel2);overflow:hidden;display:flex;border:1px solid var(--line)}
  .bar i{display:block;height:100%}
  .bar .ok{background:var(--ok)} .bar .skip{background:var(--skip)}
  .counts{display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin:10px 0 12px;font-size:12px;color:var(--muted)}
  .counts .n{color:var(--txt);font-weight:600;font-family:'IBM Plex Mono',monospace}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
  .dot.ok{background:var(--ok)} .dot.skip{background:var(--skip)} .dot.pend{background:var(--dim)} .dot.rem{background:var(--rem)}

  .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filters button{background:var(--panel);color:var(--muted);border:1px solid var(--line);
    padding:5px 11px;border-radius:7px;cursor:pointer;font:inherit;font-size:12px;transition:.12s}
  .filters button:hover{border-color:var(--dim);color:var(--txt)}
  .filters button.on{background:var(--panel2);color:var(--txt);border-color:var(--ok);box-shadow:0 0 0 1px var(--ok) inset}
  .filters button .c{color:var(--dim);margin-left:5px;font-family:'IBM Plex Mono',monospace}
  input.search{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--line);color:var(--txt);
    padding:7px 11px;border-radius:7px;font:inherit;font-size:13px;outline:none}
  input.search:focus{border-color:var(--ok)}
  .reset{background:transparent;border:1px solid var(--line);color:var(--dim);padding:5px 10px;
    border-radius:7px;cursor:pointer;font:inherit;font-size:12px}
  .reset:hover{color:var(--warn);border-color:var(--warn)}

  .sec{margin-top:22px}
  .sec h2{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;
    margin:0 0 8px;display:flex;align-items:center;gap:10px}
  .sec h2 .sp{font-family:'IBM Plex Mono',monospace;color:var(--dim);font-weight:500;text-transform:none;letter-spacing:0}

  .row{border:1px solid var(--line);border-radius:9px;background:var(--panel);margin-bottom:6px;transition:.1s;overflow:hidden}
  .row:hover{border-color:var(--dim)}
  .row.hasrem{border-left:3px solid var(--rem)}
  .row.ok .head{opacity:.55} .row.skip .head{opacity:.45}
  .row.ok .name,.row.skip .name{text-decoration:line-through;text-decoration-color:var(--dim)}
  .head{display:flex;align-items:flex-start;gap:11px;padding:9px 11px}
  .head:hover{background:var(--panel2)}

  .chk{flex:none;width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);
    background:var(--panel2);cursor:pointer;margin-top:1px;display:grid;place-items:center;
    color:transparent;font-size:13px;font-weight:700;transition:.1s;user-select:none}
  .chk:hover{border-color:var(--ok)}
  .row.ok .chk{background:var(--ok);border-color:var(--ok);color:#0e0f13;opacity:1}
  .row.skip .chk{background:var(--skip);border-color:var(--skip);color:#0e0f13;opacity:1}

  .body{flex:1;min-width:0}
  .top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .name{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;word-break:break-word}
  .badge{font-size:10px;padding:1px 6px;border-radius:5px;font-weight:600;letter-spacing:.03em;flex:none}
  .badge.warn{background:var(--warnbg);color:var(--warn)}
  .badge.info{background:var(--infobg);color:var(--info)}
  .badge.rem{background:var(--rembg);color:var(--rem)}
  .note{color:var(--muted);font-size:12px;margin-top:3px;line-height:1.4}
  .note.warn{color:#e9c46a}

  .actions{display:flex;gap:7px;flex:none;margin-top:1px;align-items:center}
  .actions a,.actions button{font-size:12px;text-decoration:none;padding:4px 9px;border-radius:6px;
    border:1px solid var(--line);color:var(--muted);white-space:nowrap;transition:.1s;background:transparent;
    font:inherit;cursor:pointer}
  .actions a:hover{color:var(--ok);border-color:var(--ok)}
  .actions a.docs:hover{color:var(--info);border-color:var(--info)}
  .actions .rembtn:hover{color:var(--rem);border-color:var(--rem)}
  .actions .rembtn.active{color:var(--rem);border-color:var(--rem);background:var(--rembg)}
  .skipbtn:hover{color:var(--skip);border-color:var(--skip)}
  .row.skip .skipbtn{color:var(--skip);border-color:var(--skip)}

  .editor{padding:0 11px 11px 42px;display:none}
  .row.open .editor{display:block}
  textarea{width:100%;min-height:84px;resize:vertical;background:#0b0c10;border:1px solid var(--line);
    color:var(--txt);border-radius:8px;padding:9px 11px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;
    line-height:1.5;outline:none}
  textarea:focus{border-color:var(--rem)}
  .ehint{color:var(--dim);font-size:11px;margin-top:4px;display:flex;justify-content:space-between}

  .empty{color:var(--dim);text-align:center;padding:40px;font-size:13px}
  .savenote{position:fixed;bottom:62px;right:16px;background:var(--panel2);border:1px solid var(--line);
    color:var(--muted);font-size:11px;padding:6px 12px;border-radius:8px;opacity:0;transition:.3s;pointer-events:none;z-index:40}
  .savenote.show{opacity:1}

  .footbar{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(14,15,19,.92);
    backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:10px 18px}
  .footbar .inner{max-width:1060px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .footbar .fstat{color:var(--muted);font-size:12px}
  .footbar .fstat .n{color:var(--rem);font-weight:600;font-family:'IBM Plex Mono',monospace}
  .build{margin-left:auto;background:var(--ok);color:#0a0b0e;border:none;padding:9px 18px;border-radius:8px;
    font:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:.12s}
  .build:hover{filter:brightness(1.08)}

  .modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:24px}
  .modal.show{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(820px,100%);
    max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  .sheet h3{margin:0;padding:16px 18px;font-size:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .sheet h3 .x{margin-left:auto;cursor:pointer;color:var(--dim);font-size:18px;line-height:1}
  .sheet h3 .x:hover{color:var(--txt)}
  .opts{display:flex;gap:16px;padding:11px 18px;border-bottom:1px solid var(--line);flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .opts label{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
  .opts input{accent-color:var(--ok)}
  .out{flex:1;margin:0;border:none;border-radius:0;min-height:300px;border-top:none}
  .mbtns{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--line)}
  .mbtns button{padding:8px 16px;border-radius:8px;font:inherit;font-size:13px;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--txt)}
  .mbtns .copy{background:var(--ok);color:#0a0b0e;border:none;font-weight:600}
  .mbtns .copy.done{background:var(--info)}
  .hide{display:none!important}
</style>

<div class="wrap">
  <header>
    <h1>Ревью jsSDK-примеров · TS + UMD</h1>
    <div class="sub"><b>81</b> пример + <b>1</b> tooling-фикс · форк <span class="mono">@ 7f667d9</span> · пиши замечание к пункту → собери в один md для PR</div>

    <div class="bar"><i class="ok" id="barOk"></i><i class="skip" id="barSkip"></i></div>

      <span><span class="n" id="pct">0%</span> просмотрено</span>
      <span><span class="dot ok"></span><span class="n" id="cOk">0</span> ок</span>
      <span><span class="dot rem"></span><span class="n" id="cRem">0</span> с замечаниями</span>
      <span><span class="dot skip"></span><span class="n" id="cSkip">0</span> skip</span>
      <span><span class="dot pend"></span><span class="n" id="cPend">0</span> осталось</span>

    <div class="controls">
      <input class="search" id="search" placeholder="Фильтр по имени файла…" autocomplete="off">
      <div class="filters" id="filters">
        <button data-f="all" class="on">Все <span class="c" id="fAll"></span></button>
        <button data-f="pending">Осталось <span class="c" id="fPend"></span></button>
        <button data-f="rem">С замеч. <span class="c" id="fRem"></span></button>
        <button data-f="warn">⚠️ <span class="c" id="fWarn"></span></button>
        <button data-f="info">ℹ️ <span class="c" id="fInfo"></span></button>
        <button data-f="ok">Ок <span class="c" id="fOk"></span></button>
        <button data-f="skip">Skip <span class="c" id="fSkip"></span></button>
      </div>
      <button class="reset" id="reset">сброс</button>
    </div>
  </header>

  <div id="list"></div>
</div>

<div class="footbar">
  <div class="inner">
    <span class="fstat"><span class="n" id="footRem">0</span> замечаний готово к сборке</span>
    <button class="build" id="build">Собрать .md →</button>
  </div>
</div>

<div class="savenote" id="savenote">сохранено</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3>Результат ревью — markdown для PR <span class="x" id="mClose">✕</span></h3>
    <div class="opts">
      <label><input type="checkbox" id="optRem" checked> замечания</label>
      <label><input type="checkbox" id="optOk"> проверенные (ок)</label>
      <label><input type="checkbox" id="optSkip"> пропущенные</label>
      <label><input type="checkbox" id="optPend"> непросмотренные</label>
    </div>
    <textarea class="out" id="out" readonly spellcheck="false"></textarea>
    <div class="mbtns">
      <button class="copy" id="mCopy">Копировать</button>
      <button id="mDownload">Скачать .md</button>
    </div>
  </div>
</div>

 "https://github.com/IgorShevchik/b24-rest-docs/blob/main/api-reference/crm/companies/userfields/crm-company-userfield-update.md", "issue": "https://github.com/IgorShevchik/b24-rest-docs/issues/new?title=Review%3A%20api-reference%2Fcrm%2Fcompanies%2Fuserfields%2Fcrm-company-userfield-update.md&body=https%3A%2F%2Fgithub.com%2FIgorShevchik%2Fb24-rest-docs%2Fblob%2Fmain%2Fapi-reference%2Fcrm%2Fcompanies%2Fuserfields%2Fcrm-company-userfield-update.md", "note": "", "flag": "", "docs": "https://apidocs.bitrix24.ru/api-reference/crm/companies/userfields/crm-company-userfield-update.html"}, {"section": "Tooling (не пример — фикс инструментария)", "prefix": ".actualize", "name": "validate.py", "file": "https://github.com/IgorShevchik/b24-rest-docs/blob/main/.actualize/validate.py", "issue": "https://github.com/IgorShevchik/b24-rest-docs/issues/new?title=Review%3A%20.actualize%2Fvalidate.py&body=https%3A%2F%2Fgithub.com%2FIgorShevchik%2Fb24-rest-docs%2Fblob%2Fmain%2F.actualize%2Fvalidate.py", "note": "ℹ️ фикс: относительный `--project` теперь резолвится (был `FileNotFoundError`).", "flag": "info", "docs": ""}];
const KEY='b24-jssdk-review-v2', OLDKEY='b24-jssdk-review-v1';
const FORK='7f667d9';
ITEMS.forEach((it,i)=>{ it.id=i+'|'+it.name; });

let st={};          // id -> {status:'ok'|'skip', remark:string}
let open={};        // id -> bool (editor expanded)
let filter='all', query='';

function rec(it){ if(!st[it.id]) st[it.id]={status:'',remark:''}; return st[it.id]; }
function status(it){ return (st[it.id]&&st[it.id].status)||''; }
function remark(it){ return (st[it.id]&&st[it.id].remark)||''; }
function hasRem(it){ return remark(it).trim().length>0; }

async function load(){
  try{
    const r=await window.storage.get(KEY);
    if(r&&r.value){ st=JSON.parse(r.value); }
    else{
      const old=await window.storage.get(OLDKEY).catch(()=>null);
      if(old&&old.value){ const o=JSON.parse(old.value);
        Object.keys(o).forEach(id=>{ st[id]={status:o[id]==='done'?'ok':o[id],remark:''}; }); }
    }
  }catch(e){ st={}; }
  render();
}
let saveT=null;
function saveSoon(){ clearTimeout(saveT); saveT=setTimeout(save,500); }
async function save(){ try{ await window.storage.set(KEY,JSON.stringify(st)); flash(); }catch(e){ console.error(e); } }
let flashT=null;
function flash(){ const n=document.getElementById('savenote'); n.classList.add('show');
  clearTimeout(flashT); flashT=setTimeout(()=>n.classList.remove('show'),900); }

function cycle(it){ const s=status(it); rec(it).status = s===''?'ok':(s==='ok'?'skip':''); save(); render(); }
function toggleEditor(it){ open[it.id]=!open[it.id]; render(); }

function passes(it){
  const s=status(it);
  if(filter==='pending' && (s!==''||hasRem(it))) return false;
  if(filter==='ok' && s!=='ok') return false;
  if(filter==='skip' && s!=='skip') return false;
  if(filter==='rem' && !hasRem(it)) return false;
  if(filter==='warn' && it.flag!=='warn') return false;
  if(filter==='info' && it.flag!=='info') return false;
  if(query && !it.name.toLowerCase().includes(query)) return false;
  return true;
}

function render(){
  const list=document.getElementById('list'); list.innerHTML='';
  const secs=[], bySec={};
  ITEMS.forEach(it=>{ if(!bySec[it.section]){bySec[it.section]=[];secs.push(it.section);} bySec[it.section].push(it); });
  let shown=0;
  secs.forEach(sec=>{
    const all=bySec[sec], vis=all.filter(passes);
    if(!vis.length) return; shown+=vis.length;
    const seen=all.filter(i=>status(i)!==''||hasRem(i)).length;
    const sd=document.createElement('div'); sd.className='sec';
    sd.innerHTML=`<h2>${esc(sec)} <span class="sp">${seen}/${all.length}</span></h2>`;
    vis.forEach(it=>sd.appendChild(rowEl(it)));
    list.appendChild(sd);
  });
  if(!shown) list.innerHTML='<div class="empty">Ничего не подходит под фильтр.</div>';
  stats();
}

function rowEl(it){
  const s=status(it), hr=hasRem(it), op=!!open[it.id];
  const d=document.createElement('div');
  d.className='row'+(s==='ok'?' ok':'')+(s==='skip'?' skip':'')+(hr?' hasrem':'')+(op?' open':'');
  const mark=s==='ok'?'✓':(s==='skip'?'–':'');
  let badge = it.flag==='warn'?'<span class="badge warn">⚠️ проверить</span>'
            : it.flag==='info'?'<span class="badge info">ℹ️ нюанс</span>':'';
  if(hr) badge += '<span class="badge rem">● замечание</span>';
  const note=it.note?`<div class="note ${it.flag==='warn'?'warn':''}">${esc(stripFlag(it.note))}</div>`:'';
  d.innerHTML=`
    <div class="head">
      <div class="chk" title="клик: pending → ок → skip">${mark}</div>
      <div class="body">
        <div class="top"><span class="name">${esc(it.prefix)} / ${esc(it.name)}</span>${badge}</div>
        ${note}
      </div>
      <div class="actions">
        <a class="file" href="${it.file}" target="_blank" rel="noopener">↗ файл</a>
        ${it.docs?`<a class="docs" href="${it.docs}" target="_blank" rel="noopener">↗ доки</a>`:''}
        <button class="rembtn${hr?' active':''}">✎ замечание</button>
        <button class="skipbtn">skip</button>
      </div>
    </div>
    <div class="editor">
      <textarea placeholder="Замечание в markdown… (пусто = нет замечаний)">${esc(remark(it))}</textarea>
      <div class="ehint"><span>markdown сохраняется автоматически</span><span class="cnt"></span></div>
    </div>`;
  d.querySelector('.chk').addEventListener('click',e=>{e.stopPropagation();cycle(it);});
  d.querySelector('.skipbtn').addEventListener('click',e=>{e.stopPropagation();rec(it).status=status(it)==='skip'?'':'skip';save();render();});
  d.querySelector('.rembtn').addEventListener('click',e=>{e.stopPropagation();toggleEditor(it);});
  const ta=d.querySelector('textarea');
  const cnt=d.querySelector('.cnt');
  const upd=()=>{ cnt.textContent=ta.value.trim()?ta.value.length+' симв.':''; };
  upd();
  ta.addEventListener('input',()=>{ rec(it).remark=ta.value; upd(); saveSoon(); stats(); refreshRowFlag(d,it); });
  if(op) setTimeout(()=>ta.focus(),0);
  return d;
}
function refreshRowFlag(d,it){
  const hr=hasRem(it);
  d.classList.toggle('hasrem',hr);
  d.querySelector('.rembtn').classList.toggle('active',hr);
}

function stats(){
  let ok=0,skip=0,rem=0;
  ITEMS.forEach(it=>{ const s=status(it); if(s==='ok')ok++; else if(s==='skip')skip++; if(hasRem(it))rem++; });
  const total=ITEMS.length, seen=ITEMS.filter(it=>status(it)!==''||hasRem(it)).length, pend=total-seen;
  set('cOk',ok);set('cSkip',skip);set('cRem',rem);set('cPend',pend);
  set('pct',Math.round(seen/total*100)+'%');
  document.getElementById('barOk').style.width=(ok/total*100)+'%';
  document.getElementById('barSkip').style.width=(skip/total*100)+'%';
  set('fAll',total);set('fPend',pend);set('fOk',ok);set('fSkip',skip);set('fRem',rem);
  set('fWarn',ITEMS.filter(i=>i.flag==='warn').length);
  set('fInfo',ITEMS.filter(i=>i.flag==='info').length);
  set('footRem',rem);
}
function set(id,v){ const e=document.getElementById(id); if(e)e.textContent=v; }
function stripFlag(t){ return t.replace(/^⚠️\s*/,'').replace(/^ℹ️\s*/,''); }
function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ---- build markdown ---- */
function buildMd(){
  const o={rem:document.getElementById('optRem').checked, ok:document.getElementById('optOk').checked,
           skip:document.getElementById('optSkip').checked, pend:document.getElementById('optPend').checked};
  const total=ITEMS.length;
  let nOk=0,nSkip=0,nRem=0,nPend=0;
  ITEMS.forEach(it=>{ const s=status(it); if(hasRem(it))nRem++; if(s==='ok')nOk++; else if(s==='skip')nSkip++;
    if(s===''&&!hasRem(it))nPend++; });
  const seen=total-nPend;

  let L=[];
  L.push('# Ревью актуализации jsSDK-примеров (TS + UMD)');
  L.push('');
  L.push(`Замена таба \`- JS\` (\`callMethod\`/\`callListMethod\`/\`fetchListMethod\`, удалены в b24jssdk 2.0) на \`- JS (TS)\` + \`- JS (UMD)\` на actions API. Форк \`@ ${FORK}\`.`);
  L.push('');
  L.push(`**Итог:** просмотрено ${seen}/${total} · с замечаниями: ${nRem} · ок: ${nOk} · пропущено: ${nSkip}.`);
  L.push('');

  // group sections preserving order
  const secs=[], bySec={};
  ITEMS.forEach(it=>{ if(!bySec[it.section]){bySec[it.section]=[];secs.push(it.section);} bySec[it.section].push(it); });

  if(o.rem){
    L.push('## Замечания');
    L.push('');
    let any=false;
    secs.forEach(sec=>{
      const withRem=bySec[sec].filter(hasRem);
      if(!withRem.length) return; any=true;
      L.push(`### ${sec}`); L.push('');
      withRem.forEach(it=>{
        L.push(`#### \`${it.name}\` — [файл](${it.file})`+(it.docs?` · [доки](${it.docs})`:''));
        if(it.flag==='warn') L.push('> ⚠️ '+stripFlag(it.note));
        else if(it.flag==='info') L.push('> ℹ️ '+stripFlag(it.note));
        L.push('');
        L.push(remark(it).trim());
        L.push('');
      });
    });
    if(!any){ L.push('_Замечаний нет._'); L.push(''); }
  }

  const appendix=(title,pred)=>{
    const arr=ITEMS.filter(pred);
    if(!arr.length) return;
    L.push('## '+title); L.push('');
    const bs={},so=[];
    arr.forEach(it=>{ if(!bs[it.section]){bs[it.section]=[];so.push(it.section);} bs[it.section].push(it); });
    so.forEach(sec=>{ L.push(`**${sec}**`); bs[sec].forEach(it=>L.push(`- \`${it.name}\``)); L.push(''); });
  };
  if(o.ok)   appendix('Проверено без замечаний', it=>status(it)==='ok'&&!hasRem(it));
  if(o.skip) appendix('Пропущено', it=>status(it)==='skip');
  if(o.pend) appendix('Не просмотрено', it=>status(it)===''&&!hasRem(it));

  return L.join('\n').replace(/\n{3,}/g,'\n\n').trimEnd()+'\n';
}
function refreshOut(){ document.getElementById('out').value=buildMd(); }

/* ---- events ---- */
document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return; filter=b.dataset.f;
  [...document.querySelectorAll('#filters button')].forEach(x=>x.classList.toggle('on',x===b)); render();
});
document.getElementById('search').addEventListener('input',e=>{ query=e.target.value.toLowerCase().trim(); render(); });
document.getElementById('reset').addEventListener('click',()=>{ if(confirm('Сбросить весь прогресс и замечания?')){ st={};open={};save();render(); }});

const modal=document.getElementById('modal');
document.getElementById('build').addEventListener('click',()=>{ refreshOut(); modal.classList.add('show'); });
document.getElementById('mClose').addEventListener('click',()=>modal.classList.remove('show'));
modal.addEventListener('click',e=>{ if(e.target===modal) modal.classList.remove('show'); });
['optRem','optOk','optSkip','optPend'].forEach(id=>document.getElementById(id).addEventListener('change',refreshOut));

document.getElementById('mCopy').addEventListener('click',async()=>{
  const out=document.getElementById('out'); const btn=document.getElementById('mCopy');
  out.focus(); out.select();
  let okc=false;
  try{ await navigator.clipboard.writeText(out.value); okc=true; }
  catch(e){ try{ okc=document.execCommand('copy'); }catch(_){ okc=false; } }
  btn.textContent=okc?'Скопировано ✓':'Выдели и Ctrl+C'; btn.classList.add('done');
  setTimeout(()=>{ btn.textContent='Копировать'; btn.classList.remove('done'); },1600);
});
document.getElementById('mDownload').addEventListener('click',()=>{
  const blob=new Blob([document.getElementById('out').value],{type:'text/markdown'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='b24-jssdk-review-result.md'; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },500);
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') modal.classList.remove('show'); });

load();
</script>
