name: validate-examples

# Validates the actualized b24jssdk TS + UMD examples.
# Requires the .actualize/ tooling to be present on the default branch
# (see the tooling PR). On a docs PR the workflow runs from the base branch.

on:
  pull_request:
    paths:
      - 'api-reference/**/*.md'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Collect changed example files
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
          else
            base='${{ github.event.before }}'
          fi
          git diff --name-only "$base" HEAD -- 'api-reference/**/*.md' > changed.txt 2>/dev/null || true
          echo "Changed example files:"; cat changed.txt || true

      - name: Validate TS + UMD examples
        run: |
          rc=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            [ -f "$f" ] || continue
            # only validate files that carry the actualized "- TS" tab
            if grep -q '^- TS$' "$f"; then
              echo "::group::validate $f"
              python3 .actualize/validate.py "$f" || rc=1
              echo "::endgroup::"
            fi
          done < changed.txt
          exit $rc

      - name: Verify ledger drift (push to main only)
        if: github.event_name == 'push'
        run: python3 .actualize/record.py --verify-all
